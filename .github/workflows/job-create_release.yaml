name: Create Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (sample 1.0.0)"
        required: true
        type: string

jobs:
  create-release:
    name: Create draft GitHub release v${{ inputs.tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create draft prerelease on GitHub
        uses: softprops/action-gh-release@v1
        id: create_release
        with:
          tag_name: ${{ inputs.tag }}
          name: v${{ inputs.tag }}
          draft: true
          prerelease: true
          generate_release_notes: true

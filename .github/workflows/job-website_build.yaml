name: Website Build

on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: false

jobs:
  website-build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: C4G.Docs
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: C4G.Docs/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: Upload website build artifact
        uses: actions/upload-artifact@v4
        if: inputs.upload-artifact
        with:
          name: website-build
          path: C4G.Docs/build

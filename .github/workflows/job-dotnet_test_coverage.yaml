name: .NET Test Coverage

on:
  workflow_call:

jobs:
  test-coverage:
    name: Run .NET tests with coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 and 10 SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Run standalone tests in Release mode
        run: dotnet test C4G.Standalone.Tests/C4G.Standalone.Tests.csproj --configuration Release

      - name: Enforce coverage threshold against Summary.json
        working-directory: .github/workflows/scripts
        run: dotnet run --file ./CheckCoverageThreshold.cs -- --summary-path "${{ github.workspace }}/C4G.Unity/CodeCoverage/Summary.json" --threshold 97

      - name: Build PR comment from coverage summary
        if: github.event_name == 'pull_request'
        run: |
          echo "### Standalone Test Coverage" > comment.md
          echo "" >> comment.md
          echo "**Commit:** ${{ github.event.pull_request.head.sha }}" >> comment.md
          echo "" >> comment.md
          echo "---" >> comment.md
          echo "" >> comment.md
          cat C4G.Unity/CodeCoverage/Summary.md >> comment.md

      - name: Find existing coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Standalone Test Coverage

      - name: Post or update coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace
